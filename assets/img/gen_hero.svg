<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <linearGradient id="hero-bg" x1="0" y1="0" x2="1400" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#11103A"/>
      <stop offset="1" stop-color="#1a1960"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="900" fill="url(#hero-bg)"/>
  <!-- grille géométrique or subtile -->
  <g opacity="0.07" stroke="#F2A900" stroke-width="1" fill="none">
    <line x1="0" y1="150" x2="1400" y2="150"/>
    <line x1="0" y1="300" x2="1400" y2="300"/>
    <line x1="0" y1="450" x2="1400" y2="450"/>
    <line x1="0" y1="600" x2="1400" y2="600"/>
    <line x1="0" y1="750" x2="1400" y2="750"/>
    <line x1="200" y1="0" x2="200" y2="900"/>
    <line x1="400" y1="0" x2="400" y2="900"/>
    <line x1="600" y1="0" x2="600" y2="900"/>
    <line x1="800" y1="0" x2="800" y2="900"/>
    <line x1="1000" y1="0" x2="1000" y2="900"/>
    <line x1="1200" y1="0" x2="1200" y2="900"/>
  </g>
  <!-- motif diagonales or -->
  <g opacity="0.05" stroke="#F2A900" stroke-width="1" fill="none">
    <line x1="0" y1="0" x2="900" y2="900"/>
    <line x1="200" y1="0" x2="1100" y2="900"/>
    <line x1="400" y1="0" x2="1300" y2="900"/>
    <line x1="600" y1="0" x2="1400" y2="800"/>
  </g>
  <!-- cercle accent or -->
  <circle cx="1050" cy="420" r="280" fill="none" stroke="#F2A900" stroke-width="1.5" opacity="0.12"/>
  <circle cx="1050" cy="420" r="180" fill="none" stroke="#F2A900" stroke-width="1" opacity="0.09"/>
  <!-- accent or centre droit -->
  <rect x="950" y="340" width="4" height="160" fill="#F2A900" opacity="0.3"/>
  <rect x="970" y="370" width="180" height="4" fill="#F2A900" opacity="0.2"/>
</svg>
