<svg xmlns="http://www.w3.org/2000/svg" width="800" height="550" viewBox="0 0 800 550">
  <rect width="800" height="550" fill="#11103A"/>
  <rect x="0" y="0" width="800" height="4" fill="#F2A900" opacity="0.7"/>
  <!-- radar / veille concurrentielle -->
  <g transform="translate(400,270)">
    <polygon points="0,-160 138,-80 138,80 0,160 -138,80 -138,-80" fill="none" stroke="#F2A900" stroke-width="1" opacity="0.15"/>
    <polygon points="0,-110 95,-55 95,55 0,110 -95,55 -95,-55" fill="none" stroke="#F2A900" stroke-width="1" opacity="0.12"/>
    <polygon points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30" fill="none" stroke="#F2A900" stroke-width="1" opacity="0.1"/>
    <!-- axes -->
    <line x1="0" y1="-160" x2="0" y2="160" stroke="#F2A900" stroke-width="1" opacity="0.12"/>
    <line x1="-138" y1="-80" x2="138" y2="80" stroke="#F2A900" stroke-width="1" opacity="0.12"/>
    <line x1="-138" y1="80" x2="138" y2="-80" stroke="#F2A900" stroke-width="1" opacity="0.12"/>
    <!-- données radar -->
    <polygon points="0,-130 120,-60 100,70 -30,120 -120,50 -80,-90" fill="#F2A900" opacity="0.12"/>
    <polygon points="0,-130 120,-60 100,70 -30,120 -120,50 -80,-90" fill="none" stroke="#F2A900" stroke-width="2" opacity="0.5"/>
  </g>
  <text x="400" y="490" fill="#FAFAF8" font-family="Inter,Arial" font-size="13" font-weight="500" text-anchor="middle" opacity="0.5">Analyses, Veilles &amp; Intelligence Economique</text>
</svg>
