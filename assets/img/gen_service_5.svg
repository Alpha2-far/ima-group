<svg xmlns="http://www.w3.org/2000/svg" width="800" height="550" viewBox="0 0 800 550">
  <rect width="800" height="550" fill="#11103A"/>
  <rect x="0" y="0" width="800" height="4" fill="#F2A900" opacity="0.7"/>
  <!-- événement / conférence stylisé -->
  <!-- scène -->
  <rect x="100" y="350" width="600" height="8" rx="0" fill="#F2A900" opacity="0.3"/>
  <!-- podium / pupitre -->
  <rect x="360" y="280" width="80" height="70" rx="0" fill="#F2A900" opacity="0.2"/>
  <rect x="350" y="260" width="100" height="25" rx="0" fill="#F2A900" opacity="0.35"/>
  <!-- personnes stylisées (cercles + rectangles) -->
  <circle cx="200" cy="300" r="18" fill="#FAFAF8" opacity="0.08"/>
  <rect x="188" y="318" width="24" height="35" rx="0" fill="#FAFAF8" opacity="0.06"/>
  <circle cx="280" cy="305" r="18" fill="#FAFAF8" opacity="0.08"/>
  <rect x="268" y="323" width="24" height="30" rx="0" fill="#FAFAF8" opacity="0.06"/>
  <circle cx="520" cy="300" r="18" fill="#FAFAF8" opacity="0.08"/>
  <rect x="508" y="318" width="24" height="35" rx="0" fill="#FAFAF8" opacity="0.06"/>
  <circle cx="600" cy="305" r="18" fill="#FAFAF8" opacity="0.08"/>
  <rect x="588" y="323" width="24" height="30" rx="0" fill="#FAFAF8" opacity="0.06"/>
  <!-- étoile accent -->
  <circle cx="400" cy="150" r="30" fill="#F2A900" opacity="0.15"/>
  <circle cx="400" cy="150" r="18" fill="#F2A900" opacity="0.25"/>
  <!-- lignes rayonnantes -->
  <line x1="400" y1="110" x2="400" y2="90" stroke="#F2A900" stroke-width="2" opacity="0.3"/>
  <line x1="430" y1="120" x2="445" y2="105" stroke="#F2A900" stroke-width="2" opacity="0.3"/>
  <line x1="370" y1="120" x2="355" y2="105" stroke="#F2A900" stroke-width="2" opacity="0.3"/>
  <text x="400" y="490" fill="#FAFAF8" font-family="Inter,Arial" font-size="13" font-weight="500" text-anchor="middle" opacity="0.5">Organisation d'Evenements &amp; Experience Client</text>
</svg>
